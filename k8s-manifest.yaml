apiVersion: v1
kind: ConfigMap
metadata:
  name: atmospheric-grid-config
  namespace: default
data:
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atmospheric-grid-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atmospheric-grid
  namespace: default
  labels:
    app: atmospheric-grid
    component: witness-node
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: atmospheric-grid
  template:
    metadata:
      labels:
        app: atmospheric-grid
        component: witness-node
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - atmospheric-grid
              topologyKey: kubernetes.io/hostname
      containers:
      - name: atmospheric-grid
        image: atmospheric-grid:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: atmospheric-grid-config
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: atmospheric-grid-data
      securityContext:
        fsGroup: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: atmospheric-grid
  namespace: default
  labels:
    app: atmospheric-grid
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  selector:
    app: atmospheric-grid

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: atmospheric-grid-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: atmospheric-grid
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: atmospheric-grid-pdb
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: atmospheric-grid

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atmospheric-grid
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atmospheric-grid
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atmospheric-grid
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atmospheric-grid
subjects:
- kind: ServiceAccount
  name: atmospheric-grid
  namespace: default
